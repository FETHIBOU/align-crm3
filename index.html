<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALign CRM Pro</title>

    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/512/crm.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://img.icons8.com/fluency/192/crm.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ALign CRM">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #2c3e50; 
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #3498db;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .instructions {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 320px;
            text-align: left;
        }
        h2 { margin-bottom: 10px; }
        p.subtitle { margin-top: 0; color: #7f8c8d; font-size: 1rem; }
    </style>
</head>
<body>
    <div id="content">
        <img src="https://img.icons8.com/fluency/512/crm.png" width="140" alt="Logo CRM Professionnel" style="margin-bottom: 10px;">
        <h2>ALign CRM Pro</h2>
        <p class="subtitle">Votre environnement de gestion client</p>
        
        <a href="https://script.google.com/a/macros/airliquide.com/s/AKfycbw3Aitc9qQk2kRf9jJXmCuK6x6mEggVMfGI7XWgYN6Ax-MwaFHmyRqexcoKJU2k7DY/exec" class="btn">Ouvrir l'application</a>

        <div class="instructions">
            <p style="text-align: center; margin-top: 0; color: #2c3e50;"><strong>📲 Installer l'application</strong></p>
            <p><strong>iOS (Safari) :</strong> Touchez l'icône de partage (carré avec flèche) puis "Sur l'écran d'accueil".</p>
            <p><strong>Android :</strong> Touchez les 3 points en haut à droite puis "Ajouter à l'écran d'accueil".</p>
        </div>
    </div>

    <script>
        // Détection : L'application est-elle ouverte depuis l'écran d'accueil ?
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandalone) {
            // L'utilisateur a cliqué sur son icône personnelle ! On redirige de suite.
            document.getElementById('content').style.display = 'none';
            document.body.innerHTML = '<h3>⏳ Ouverture de ALign CRM Pro...</h3>';
            
            window.location.href = "https://script.google.com/a/macros/airliquide.com/s/AKfycbw3Aitc9qQk2kRf9jJXmCuK6x6mEggVMfGI7XWgYN6Ax-MwaFHmyRqexcoKJU2k7DY/exec";
        }
    </script>
</body>
</html>
