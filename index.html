<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALign CRM Pro</title>

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23002d72'/%3E%3Ctext x='50%25' y='55%25' font-family='Arial, sans-serif' font-size='45' font-weight='bold' fill='%23ffffff' text-anchor='middle' dominant-baseline='middle'%3EAL%3C/text%3E%3C/svg%3E">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23002d72'/%3E%3Ctext x='50%25' y='55%25' font-family='Arial, sans-serif' font-size='45' font-weight='bold' fill='%23ffffff' text-anchor='middle' dominant-baseline='middle'%3EAL%3C/text%3E%3C/svg%3E">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ALign CRM">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #2c3e50; 
            text-align: center;
            padding: 20px;
        }
        .btn {
            background-color: #002d72; /* Bleu Air Liquide */
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #001f4d;
        }
        .instructions {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 320px;
            text-align: left;
        }
        h2 { margin-bottom: 5px; color: #002d72; }
        p.subtitle { margin-top: 0; color: #7f8c8d; font-size: 1rem; }
        
        /* Style du SVG sur la page d'accueil */
        .app-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            border-radius: 24px;
        }
    </style>
</head>
<body>
    <div id="content">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="app-icon">
            <rect width="100" height="100" rx="20" fill="#002d72"/>
            <text x="50%" y="55%" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">AL</text>
        </svg>

        <h2>ALign CRM Pro</h2>
        <p class="subtitle">Votre environnement de gestion client</p>
        
        <a href="https://script.google.com/a/macros/airliquide.com/s/AKfycbw3Aitc9qQk2kRf9jJXmCuK6x6mEggVMfGI7XWgYN6Ax-MwaFHmyRqexcoKJU2k7DY/exec" class="btn">Ouvrir l'application</a>

        <div class="instructions">
            <p style="text-align: center; margin-top: 0; color: #002d72;"><strong>📲 Installer l'application</strong></p>
            <p><strong>iOS (Safari) :</strong> Touchez l'icône de partage (carré avec flèche) puis "Sur l'écran d'accueil".</p>
            <p><strong>Android :</strong> Touchez les 3 points en haut à droite puis "Ajouter à l'écran d'accueil".</p>
        </div>
    </div>

    <script>
        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;

        if (isStandalone) {
            document.getElementById('content').style.display = 'none';
            document.body.innerHTML = '<h3 style="color:#002d72;">⏳ Ouverture de ALign CRM Pro...</h3>';
            
            window.location.href = "https://script.google.com/a/macros/airliquide.com/s/AKfycbw3Aitc9qQk2kRf9jJXmCuK6x6mEggVMfGI7XWgYN6Ax-MwaFHmyRqexcoKJU2k7DY/exec";
        }
    </script>
</body>
</html>
